<svg viewBox="0 0 640 220" xmlns="http://www.w3.org/2000/svg" font-family="IBM Plex Mono, monospace">
  <rect width="640" height="220" fill="#F7F6F2"/>
  <text x="320" y="28" text-anchor="middle" font-size="13" fill="#4A564F">ÉCHELLE DE pH DES NETTOYANTS</text>

  <rect x="40" y="60" width="560" height="20" rx="4" fill="url(#grad)"/>
  <defs>
    <linearGradient id="grad" x1="0" x2="1">
      <stop offset="0%" stop-color="#D8572E"/>
      <stop offset="50%" stop-color="#E4E1D8"/>
      <stop offset="100%" stop-color="#5C7A63"/>
    </linearGradient>
  </defs>

  <text x="40" y="100" font-size="12" fill="#1B2B26">0</text>
  <text x="320" y="100" text-anchor="middle" font-size="12" fill="#1B2B26">7</text>
  <text x="590" y="100" text-anchor="end" font-size="12" fill="#1B2B26">14</text>

  <text x="90" y="125" text-anchor="middle" font-size="12" fill="#A63F1F">Acide citrique</text>
  <text x="90" y="140" text-anchor="middle" font-size="11" fill="#4A564F">détartrant</text>

  <text x="500" y="125" text-anchor="middle" font-size="12" fill="#33473A">Cristaux de soude</text>
  <text x="500" y="140" text-anchor="middle" font-size="11" fill="#4A564F">dégraissant</text>

  <rect x="180" y="165" width="280" height="40" rx="6" fill="#FBE6DC" stroke="#D8572E"/>
  <text x="320" y="182" text-anchor="middle" font-size="12" fill="#A63F1F">⚠ Javel + acide (même vinaigre)</text>
  <text x="320" y="198" text-anchor="middle" font-size="11" fill="#A63F1F">= dégagement de Cl₂ toxique — ne jamais mélanger</text>
</svg>
