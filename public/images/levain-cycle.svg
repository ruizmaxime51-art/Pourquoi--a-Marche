  <text x="120" y="122" text-anchor="middle" font-size="11" fill="#33473A">actif</text>

  <line x1="165" y1="110" x2="255" y2="110" stroke="#1B2B26" stroke-width="1.5"/>
  <polygon points="255,110 247,105 247,115" fill="#1B2B26"/>
  <text x="210" y="98" text-anchor="middle" font-size="11" fill="#4A564F">4-8h, 20°C</text>

  <circle cx="320" cy="110" r="45" fill="#FBE6DC" stroke="#D8572E"/>
