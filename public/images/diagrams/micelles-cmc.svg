<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
<style>
  .bg { fill:#FBFAF7; }
  .panel { fill:#F7F5F0; stroke:#D2C8B8; stroke-width:2.2; }
  .panelBlue { fill:#F1F6FD; stroke:#2B6CCF; stroke-width:2.2; }
  .panelOrange { fill:#FCF5E8; stroke:#D98310; stroke-width:2.2; }
  .panelGreen { fill:#EFF7F1; stroke:#2C7A48; stroke-width:2.2; }
  .ink { fill:#142544; font-family:Roboto,Arial,sans-serif; }
  .muted { fill:#4B5563; font-family:Roboto,Arial,sans-serif; }
  .small { font-size:18px; }
  .body { font-size:22px; }
  .h1 { font-size:44px; font-weight:800; }
  .h2 { font-size:28px; font-weight:700; }
  .h3 { font-size:24px; font-weight:700; }
  .blue { fill:#2B6CCF; }
  .orange { fill:#D98310; }
  .green { fill:#2C7A48; }
  .darkstroke { stroke:#142544; stroke-width:4; fill:none; stroke-linecap:round; stroke-linejoin:round; }
  .bluestroke { stroke:#2B6CCF; stroke-width:3.5; fill:none; stroke-linecap:round; stroke-linejoin:round; }
  .orangestroke { stroke:#D98310; stroke-width:3.5; fill:none; stroke-linecap:round; stroke-linejoin:round; }
  .greenstroke { stroke:#2C7A48; stroke-width:3.5; fill:none; stroke-linecap:round; stroke-linejoin:round; }
  .redstroke { stroke:#D1495B; stroke-width:3; fill:none; stroke-linecap:round; stroke-linejoin:round; }
  .dash { stroke-dasharray:8 8; }
</style>
<defs>
  <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
    <path d="M0,0 L12,6 L0,12 z" fill="#142544"/>
  </marker>
  <marker id="blueArrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
    <path d="M0,0 L10,5 L0,10 z" fill="#2B6CCF"/>
  </marker>
  <marker id="orangeArrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
    <path d="M0,0 L10,5 L0,10 z" fill="#D98310"/>
  </marker>
  <marker id="redArrow" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
    <path d="M0,0 L8,4 L0,8 z" fill="#D1495B"/>
  </marker>
</defs>
<rect class="bg" width="1400" height="900" rx="18"/>

<rect class="panel" x="50" y="50" width="1300" height="800" rx="24"/>
<text class="ink h1" x="700" y="110" text-anchor="middle">Micelles et CMC</text>
<text class="muted body" x="700" y="150" text-anchor="middle">La tension superficielle diminue, puis devient presque constante après la concentration micellaire critique.</text>

<line x1="210" y1="610" x2="210" y2="230" class="darkstroke" marker-end="url(#arrow)"/>
<line x1="210" y1="610" x2="860" y2="610" class="darkstroke" marker-end="url(#arrow)"/>
<text class="ink body" x="125" y="235" transform="rotate(-90 125 235)">Tension superficielle</text>
<text class="ink body" x="545" y="670" text-anchor="middle">Concentration en tensioactif</text>

<path d="M260 280 C330 420, 420 500, 545 530 S690 540, 815 540" class="bluestroke" stroke-width="8"/>
<circle cx="260" cy="280" r="8" fill="#2B6CCF"/><circle cx="360" cy="445" r="8" fill="#2B6CCF"/><circle cx="470" cy="520" r="8" fill="#2B6CCF"/><circle cx="545" cy="530" r="10" fill="#2B6CCF"/><circle cx="650" cy="540" r="8" fill="#2B6CCF"/>
<line x1="545" y1="230" x2="545" y2="628" class="bluestroke dash"/>
<text class="ink body blue" x="545" y="635" text-anchor="middle" font-weight="700">CMC</text>
<text class="muted small" x="545" y="660" text-anchor="middle">concentration micellaire critique</text>

<rect class="panelBlue" x="75" y="300" width="110" height="180" rx="16"/>
<text class="ink body blue" x="130" y="335" text-anchor="middle" font-weight="700">Avant</text>
<circle cx="110" cy="370" r="6" fill="#4A86D9" stroke="#2B6CCF" stroke-width="2"/><path d="M110 378 C105 394, 115 404, 110 420" class="darkstroke" stroke-width="2.5"/><circle cx="145" cy="410" r="6" fill="#4A86D9" stroke="#2B6CCF" stroke-width="2"/><path d="M145 418 C140 434, 150 444, 145 460" class="darkstroke" stroke-width="2.5"/><circle cx="110" cy="450" r="6" fill="#4A86D9" stroke="#2B6CCF" stroke-width="2"/><path d="M110 458 C105 474, 115 484, 110 500" class="darkstroke" stroke-width="2.5"/><text class="muted small" x="130" y="470" text-anchor="middle">monomères</text>
<rect class="panelOrange" x="1040" y="300" width="170" height="190" rx="16"/>
<text class="ink body orange" x="1125" y="335" text-anchor="middle" font-weight="700">Après</text>
<circle cx="1125" cy="410" r="24" fill="#F2C45B"/>
