544" stroke-width="2.5"/><circle cx="1166.6" cy="386.0" r="7" fill="#4A86D9" stroke="#2B6CCF" stroke-width="2"/>
<text class="muted small" x="1125" y="495" text-anchor="middle">micelles</text>
<rect class="panel" x="300" y="725" width="800" height="70" rx="16"/>
<text class="muted body" x="700" y="768" text-anchor="middle">Au-dessus de la CMC, les molécules supplémentaires s’agrègent surtout en micelles.</text>

</svg>