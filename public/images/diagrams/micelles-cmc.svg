<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="850" viewBox="0 0 1000 850" role="img" aria-labelledby="title desc">
<title id="title">Graphique CMC et micelles</title><desc id="desc">La tension superficielle baisse avec la concentration puis atteint un plateau à la CMC, où les micelles se forment.</desc>
<defs><style>.t{font:700 56px system-ui,sans-serif;fill:#0b1d3a}.s{font:400 23px system-ui,sans-serif;fill:#273449}.l{font:600 22px system-ui,sans-serif;fill:#0b4fa3}.o{font:600 22px system-ui,sans-serif;fill:#d88112}.a{stroke:#111;stroke-width:3;marker-end:url(#arr)}.b{fill:#1769d1}.box{fill:#fff;stroke:#d8d8d0;stroke-width:2}.mono{font:500 20px ui-monospace,monospace;fill:#16231e}</style><marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#111"/></marker></defs>
<rect width="1000" height="850" fill="#fbfaf6"/><text x="290" y="78" class="t">Micelles et CMC</text><text x="170" y="122" class="s">La tension superficielle chute puis se stabilise quand les micelles apparaissent.</text>
<line x1="210" y1="620" x2="760" y2="620" class="a"/><line x1="210" y1="620" x2="210" y2="185" class="a"/><text x="380" y="675" class="s">Concentration en tensioactif</text><text x="88" y="430" class="s" transform="rotate(-90 88 430)">Tension superficielle</text>
<path d="M250 230 C280 330 310 430 380 495 C430 540 480 550 520 550 L720 550" fill="none" stroke="#1769d1" stroke-width="7" stroke-linecap="round"/>
<g fill="#1769d1"><circle cx="250" cy="230" r="9"/><circle cx="295" cy="370" r="9"/><circle cx="380" cy="495" r="9"/><circle cx="520" cy="550" r="13"/><circle cx="600" cy="550" r="9"/><circle cx="690" cy="550" r="9"/></g>
<line x1="520" y1="180" x2="520" y2="640" stroke="#1769d1" stroke-dasharray="10 10" stroke-width="3"/><text x="491" y="684" class="l">CMC</text><text x="385" y="720" class="s">concentration micellaire critique</text>
<text x="250" y="170" class="l">monomères / interfaces</text><text x="590" y="170" class="o">micelles</text>
<rect x="45" y="250" width="130" height="240" rx="18" fill="#eaf1ff" stroke="#1769d1"/><text x="67" y="285" class="l">Avant</text><g transform="translate(68 330)"><circle class="b" cx="0" cy="0" r="10"/><path d="M0 10 q8 14 0 28 q-8 14 0 28" fill="none" stroke="#111" stroke-width="3"/><circle class="b" cx="52" cy="50" r="10"/><path d="M52 60 q8 14 0 28 q-8 14 0 28" fill="none" stroke="#111" stroke-width="3"/><circle class="b" cx="30" cy="120" r="10"/><path d="M30 130 q8 14 0 28" fill="none" stroke="#111" stroke-width="3"/></g>
<rect x="790" y="245" width="160" height="245" rx="18" fill="#fff4df" stroke="#d88112"/><text x="824" y="285" class="o">Après</text><g transform="translate(870 380)"><circle cx="0" cy="0" r="18" fill="#ffd474"/><g stroke="#111" stroke-width="2"><line x1="0" y1="0" x2="0" y2="-58"/><line x1="0" y1="0" x2="50" y2="-25"/><line x1="0" y1="0" x2="50" y2="25"/><line x1="0" y1="0" x2="0" y2="58"/><line x1="0" y1="0" x2="-50" y2="25"/><line x1="0" y1="0" x2="-50" y2="-25"/></g><g fill="#1769d1"><circle cx="0" cy="-65" r="9"/><circle cx="58" cy="-30" r="9"/><circle cx="58" cy="30" r="9"/><circle cx="0" cy="65" r="9"/><circle cx="-58" cy="30" r="9"/><circle cx="-58" cy="-30" r="9"/></g></g>
<rect x="180" y="760" width="640" height="52" rx="14" class="box"/><text x="215" y="794" class="mono">Au-dessus de la CMC : les molécules ajoutées forment surtout des micelles.</text>
