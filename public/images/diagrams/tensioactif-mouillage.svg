<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="1060" viewBox="0 0 1000 1060" role="img" aria-labelledby="title desc">
<title id="title">Mouillage avec et sans tensioactif</title><desc id="desc">Comparaison entre une goutte qui perle et une goutte qui s’étale grâce au tensioactif.</desc><defs>
<style>
.title{font:700 54px system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#0b1d3a;letter-spacing:-1px}.subtitle{font:400 23px system-ui,sans-serif;fill:#2f3a49}.h2{font:700 34px system-ui,sans-serif;fill:#0b1d3a}.label{font:600 22px system-ui,sans-serif;fill:#0b1d3a}.small{font:400 19px system-ui,sans-serif;fill:#26313f}.tiny{font:400 16px system-ui,sans-serif;fill:#415063}.blue{fill:#1769d1}.orange{fill:#d88112}.green{fill:#237047}.purple{fill:#6a3aa8}.ink{fill:#111827}.muted{fill:#4b5563}.line{stroke:#d7dce3;stroke-width:2}.box{fill:#fff;stroke:#d7dce3;stroke-width:2}.info{fill:#f7fbff;stroke:#1769d1;stroke-width:2}.warn{fill:#fff9ed;stroke:#d88112;stroke-width:2}.water{fill:#dcefff;stroke:#68aee8;stroke-width:2}.oil{fill:#ffe1a3;stroke:#e0a144;stroke-width:2}.surface{fill:#e8e5dd;stroke:#b7b3a8;stroke-width:1}.tail{fill:none;stroke:#111827;stroke-width:4;stroke-linecap:round}.dash{stroke-dasharray:8 8}.mono{font:500 20px ui-monospace,SFMono-Regular,Menlo,monospace;fill:#111827}
</style>
<radialGradient id="blueHead" cx="35%" cy="30%"><stop offset="0" stop-color="#9fd7ff"/><stop offset="1" stop-color="#1769d1"/></radialGradient>
<radialGradient id="oilDrop" cx="35%" cy="30%"><stop offset="0" stop-color="#ffe19a"/><stop offset="1" stop-color="#d88112"/></radialGradient>
<marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#1769d1"/></marker>
<marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#d88112"/></marker>
<marker id="arrowDark" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#111827"/></marker>
</defs><rect width="100%" height="100%" fill="#fbfaf6"/>
<text x="80" y="82" class="title">Le mouillage :</text><text x="80" y="138" class="title">pourquoi l’eau s’étale mieux ?</text><text x="80" y="190" class="subtitle">En abaissant la tension superficielle, le tensioactif aide l’eau à mieux couvrir la surface.</text>
<line x1="500" y1="230" x2="500" y2="750" stroke="#d7dce3" stroke-width="2"/>
<text x="120" y="240" class="h2" fill="#1769d1">Sans tensioactif</text><text x="620" y="240" class="h2" fill="#d88112">Avec tensioactif</text>
<rect x="70" y="550" width="360" height="70" class="surface"/><path d="M70 550 C120 542 160 560 205 548 C245 538 300 560 430 550" fill="none" stroke="#8f8b82" stroke-width="4"/>
<path d="M190 550 C190 430 350 430 350 550 Z" fill="#a8d8ff" stroke="#1769d1" stroke-width="3"/><path d="M110 540 L110 455 A85 85 0 0 1 178 527" fill="none" stroke="#111" stroke-width="3"/><path d="M112 455 L100 470 M112 455 L125 466" stroke="#111" stroke-width="3"/><text x="165" y="365" class="label blue">goutte qui perle</text><line x1="255" y1="375" x2="265" y2="425" stroke="#1769d1" stroke-width="3"/>
<text x="130" y="705" class="label blue">tension superficielle élevée</text><rect x="135" y="740" width="260" height="50" rx="10" fill="#eaf1ff" stroke="#1769d1"/><text x="183" y="773" class="label blue">mauvais mouillage</text>
<rect x="570" y="550" width="360" height="70" class="surface"/><path d="M570 550 C620 542 660 560 705 548 C745 538 800 560 930 550" fill="none" stroke="#8f8b82" stroke-width="4"/>
<path d="M585 550 C650 505 840 505 920 550 Z" fill="#a8d8ff" stroke="#1769d1" stroke-width="3"/><g transform="translate(625 535) scale(0.8)"><circle cx="0" cy="0" r="12" fill="url(#blueHead)" stroke="#0b4fa3" stroke-width="2"/><path d="M0 13 C10 28 -10 42 0 57 C10 72 -10 86 0 100" class="tail" stroke-width="3"/></g><g transform="translate(680 535) scale(0.8)"><circle cx="0" cy="0" r="12" fill="url(#blueHead)" stroke="#0b4fa3" stroke-width="2"/><path d="M0 13 C10 28 -10 42 0 57 C10 72 -10 86 0 100" class="tail" stroke-width="3"/></g><g transform="translate(735 535) scale(0.8)"><circle cx="0" cy="0" r="12" fill="url(#blueHead)" stroke="#0b4fa3" stroke-width="2"/><path d="M0 13 C10 28 -10 42 0 57 C10 72 -10 86 0 100" class="tail" stroke-width="3"/></g><g transform="translate(790 535) scale(0.8)"><circle cx="0" cy="0" r="12" fill="url(#blueHead)" stroke="#0b4fa3" stroke-width="2"/><path d="M0 13 C10 28 -10 42 0 57 C10 72 -10 86 0 100" class="tail" stroke-width="3"/></g><g transform="translate(845 535) scale(0.8)"><circle cx="0" cy="0" r="12" fill="url(#blueHead)" stroke="#0b4fa3" stroke-width="2"/><path d="M0 13 C10 28 -10 42 0 57 C10 72 -10 86 0 100" class="tail" stroke-width="3"/></g><g transform="translate(900 535) scale(0.8)"><circle cx="0" cy="0" r="12" fill="url(#blueHead)" stroke="#0b4fa3" stroke-width="2"/><path d="M0 13 C10 28 -10 42 0 57 C10 72 -10 86 0 100" class="tail" stroke-width="3"/></g><g transform="translate(955 535) scale(0.8)"><circle cx="0" cy="0" r="12" fill="url(#blueHead)" stroke="#0b4fa3" stroke-width="2"/><path d="M0 13 C10 28 -10 42 0 57 C10 72 -10 86 0 100" class="tail" stroke-width="3"/></g>
<path d="M580 548 L580 500 A45 45 0 0 1 625 536" fill="none" stroke="#111" stroke-width="3"/><text x="654" y="365" class="label orange">goutte qui s’étale</text><line x1="740" y1="375" x2="760" y2="500" stroke="#d88112" stroke-width="3"/>
<text x="615" y="705" class="label orange">tension superficielle abaissée</text><rect x="645" y="740" width="230" height="50" rx="10" fill="#fff4df" stroke="#d88112"/><text x="690" y="773" class="label orange">bon mouillage</text>
<rect x="70" y="880" width="860" height="115" rx="18" class="info"/><circle cx="115" cy="936" r="26" fill="#eaf1ff" stroke="#1769d1" stroke-width="2"/><text x="106" y="949" font-size="36" font-weight="700" fill="#1769d1">i</text><text x="165" y="928" class="small">Un meilleur mouillage permet à l’eau de pénétrer les pores,</text><text x="165" y="958" class="small">les fibres et les irrégularités d’une surface sale.</text>
<g transform="translate(720 915)"><path d="M0 35 C40 15 100 15 150 35 V70 H0Z" fill="#b8dcff" stroke="#1769d1"/><path d="M20 70 v-25 q15 10 30 0 v25 M80 70 v-35 q15 10 30 0 v35" stroke="#1769d1" stroke-width="4" fill="none" marker-end="url(#arrowBlue)"/></g>
