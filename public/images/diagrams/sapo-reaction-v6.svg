<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
<title id="title">Réaction globale de saponification</title><desc id="desc">Schéma scientifique pédagogique.</desc>
<defs>
<style>
.title{font:700 46px system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#0b1d3a;letter-spacing:-.8px}
.subtitle{font:400 21px system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#2f3a49}
.h2{font:700 30px system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#0b1d3a}
.label{font:600 20px system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#0b1d3a}
.small{font:400 17px system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#273449}
.tiny{font:400 14px system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#4b5563}
.mono{font:500 19px ui-monospace,SFMono-Regular,Menlo,monospace;fill:#111827}
.box{fill:#fff;stroke:#d7dce3;stroke-width:2}
.info{fill:#f7fbff;stroke:#1769d1;stroke-width:2}
.warn{fill:#fff9ed;stroke:#d88112;stroke-width:2}
.blue{fill:#1769d1}.orange{fill:#d88112}.green{fill:#237047}.purple{fill:#6a3aa8}.red{fill:#b84b3f}.muted{fill:#667085}
.tail{fill:none;stroke:#111827;stroke-width:4;stroke-linecap:round}
.line{stroke:#d7dce3;stroke-width:2}
</style>
<radialGradient id="headBlue" cx="35%" cy="30%"><stop offset="0" stop-color="#9fd7ff"/><stop offset="1" stop-color="#1769d1"/></radialGradient>
<radialGradient id="headOrange" cx="35%" cy="30%"><stop offset="0" stop-color="#ffe19a"/><stop offset="1" stop-color="#d88112"/></radialGradient>
<marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#111827"/></marker>
<marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#1769d1"/></marker>
<marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#d88112"/></marker>
</defs>
<rect width="100%" height="100%" fill="#fbfaf6"/>
<text x="600.0" y="72" text-anchor="middle" class="title">Réaction globale de saponification</text>
<text x="600.0" y="112" text-anchor="middle" class="subtitle">Un triglycéride donne du glycérol et trois sels d’acides gras.</text>

<text x="95" y="240" class="h2">Triglycéride</text>
<g transform="translate(95 280)" class="mono">
<text x="0" y="0">R₁–COO–CH₂</text>
<text x="0" y="55">R₂–COO–CH</text>
<text x="0" y="110">R₃–COO–CH₂</text>
</g>
<text x="330" y="355" class="h2">+ 3 NaOH</text>
<path d="M520 340 H720" stroke="#111827" stroke-width="6" marker-end="url(#arrow)"/>
<text x="560" y="315" class="small">hydrolyse basique</text>
<g transform="translate(790 245)" class="mono">
<text x="0" y="0">HO–CH₂</text>
<text x="0" y="62">   |</text>
<text x="0" y="110">HO–CH</text>
<text x="0" y="172">   |</text>
<text x="0" y="220">HO–CH₂</text>
</g>
<text x="810" y="515" class="h2">Glycérol</text>
<text x="930" y="355" class="h2">+ 3 R–COO⁻ Na⁺</text>
<rect x="150" y="700" width="900" height="80" rx="18" class="info"/>
<text x="200" y="750" class="mono">1 triglycéride + 3 NaOH → glycérol + 3 savons</text>

</svg>