<rect x="515" y="250" width="430" height="520" rx="18" fill="#fffaf1" stroke="#d88112" stroke-width="2"/><text x="670" y="305" class="h2" fill="#d88112">Eau dure</text><path d="M515 330 C610 315 700 345 790 325 C850 315 900 325 945 330 V770 H515Z" fill="#dcefff" opacity=".6"/><circle cx="640" cy="385" r="22" fill="#ffd474" stroke="#d88112"/><text x="626" y="392" class="tiny">Ca²⁺</text><circle cx="870" cy="430" r="20" fill="#c8e6c9" stroke="#237047"/><text x="858" y="437" class="tiny">Mg²⁺</text><circle cx="735" cy="430" r="32" fill="#ffd474" stroke="#d88112"/><text x="718" y="438" class="small orange">Ca²⁺</text><text x="595" y="445" class="mono">R–COO⁻</text><text x="780" y="445" class="mono">R–COO⁻</text><line x1="725" y1="430" x2="680" y2="430" stroke="#111"/><line x1="745" y1="430" x2="785" y2="430" stroke="#111"/><path d="M735 470 v70" stroke="#111" stroke-width="3" marker-end="url(#arrowDark)"/><ellipse cx="735" cy="625" rx="120" ry="35" fill="#d88112" opacity=".18"/><text x="770" y="600" class="label orange">savon calcaire</text><text x="770" y="630" class="small orange">savon de chaux</text><text x="565" y="560" class="small blue">moins de savon actif</text><g transform="translate(655 590) scale(0.6)"><circle cx="0" cy="0" r="12" fill="url(#blueHead)" stroke="#0b4fa3" stroke-width="2"/><path d="M0 13 C10 28 -10 42 0 57 C10 72 -10 86 0 100" class="tail" stroke-width="3"/></g><g transform="translate(735 610) scale(0.6)"><circle cx="0" cy="0" r="12" fill="url(#blueHead)" stroke="#0b4fa3" stroke-width="2"/><path d="M0 13 C10 28 -10 42 0 57 C10 72 -10 86 0 100" class="tail" stroke-width="3"/></g><g transform="translate(805 595) scale(0.6)"><circle cx="0" cy="0" r="12" fill="url(#blueHead)" stroke="#0b4fa3" stroke-width="2"/><path d="M0 13 C10 28 -10 42 0 57 C10 72 -10 86 0 100" class="tail" stroke-width="3"/></g><rect x="545" y="690" width="370" height="55" rx="12" class="warn"/><text x="570" y="726" class="mono">2 R–COO⁻ Na⁺ + Ca²⁺ → (R–COO)₂Ca↓ + 2 Na⁺</text>
