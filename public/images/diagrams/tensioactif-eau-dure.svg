e-width="2.3"/><circle cx="268.0" cy="460.1" r="6" fill="#4A86D9" stroke="#2B6CCF" stroke-width="2"/><line x1="272.8" y1="487.1" x2="289.0" y2="475.3" stroke="#142544" stroke-width="2.3"/><circle cx="289.0" cy="475.3" r="6" fill="#4A86D9" stroke="#2B6CCF" stroke-width="2"/><circle cx="405" cy="450" r="18" fill="#F2C45B"/><line x1="427.0" y1="450.0" x2="447.0" y2="450.0" stroke="#142544" stroke-width="2.3"/><circle cx="447.0" cy="450.0" r="6" fill="#4A86D9" stroke="#2B6CCF" stroke-width="2"/><line x1="422.8" y1="462.9" x2="439.0" y2="474.7" stroke="#142544" stroke-width="2.3"/><circle cx="439.0" cy="474.7" r="6" fill="#4A86D9" stroke="#2B6CCF" stroke-width="2"/><line x1="411.8" y1="470.9" x2="418.0" y2="489.9" stroke="#142544" stroke-width="2.3"/><circle cx="418.0" cy="489.9" r="6" fill="#4A86D9" stroke="#2B6CCF" stroke-width="2"/><line x1="398.2" y1="470.9" x2="392.0" y2="489.9" stroke="#142544" stroke-width="2.3"/><circle cx="392.0" cy="489.9" r="6" fill="#4A86D9" stroke="#2B6CCF" stroke-width="2"/><line x1="387.2" y1="462.9" x2="371.0" y2="474.7" stroke="#142544" stroke-width="2.3"/><circle cx="371.0" cy="474.7" r="6" fill="#4A86D9" stroke="#2B6CCF" stroke-width="2"/><line x1="383.0" y1="450.0" x2="363.0" y2="450.0" stroke="#142544" stroke-width="2.3"/><circle cx="363.0" cy="450.0" r="6" fill="#4A86D9" stroke="#2B6CCF" stroke-width="2"/><line x1="387.2" y1="437.1" x2="371.0" y2="425.3" stroke="#142544" stroke-width="2.3"/><circle cx="371.0" cy="425.3" r="6" fill="#4A86D9" stroke="#2B6CCF" stroke-width="2"/><line x1="398.2" y1="429.1" x2="392.0" y2="410.1" stroke="#142544" stroke-width="2.3"/><circle cx="392.0" cy="410.1" r="6" fill="#4A86D9" stroke="#2B6CCF" stroke-width="2"/><line x1="411.8" y1="429.1" x2="418.0" y2="410.1" stroke="#142544" stroke-width="2.3"/><circle cx="418.0" cy="410.1" r="6" fill="#4A86D9" stroke="#2B6CCF" stroke-width="2"/><line x1="422.8" y1="437.1" x2="439.0" y2="425.3" stroke="#142544" stroke-width="2.3"/><circle cx="439.0" cy="425.3" r="6" fill="#4A86D9" stroke="#2B6CCF" stroke-width="2"/>
<text class="muted body" x="350" y="555" text-anchor="middle">Le savon reste disponible pour laver.</text>

<rect class="panelOrange" x="760" y="220" width="530" height="380" rx="22"/>
<text class="ink h2 orange" x="1025" y="270" text-anchor="middle">Eau dure</text>
<text class="ink body" x="875" y="375" text-anchor="middle">R–COO⁻</text>
<line x1="915" y1="370" x2="965" y2="370" class="darkstroke"/>
<circle cx="1025" cy="370" r="34" fill="#F3C76A" stroke="#D98310" stroke-width="4"/>
<text class="ink body orange" x="1025" y="378" text-anchor="middle" font-weight="700">Ca²⁺</text>
<line x1="1085" y1="370" x2="1135" y2="370" class="darkstroke"/>
<text class="ink body" x="1175" y="375" text-anchor="middle">R–COO⁻</text>
<line x1="1025" y1="405" x2="1025" y2="460" class="darkstroke" marker-end="url(#arrow)"/>
<rect x="855" y="485" width="340" height="62" rx="28" fill="none" stroke="#D98310" stroke-width="3"/>
<text class="ink body orange" x="1025" y="525" text-anchor="middle">savon calcaire insoluble</text>
<text class="muted body" x="1025" y="565" text-anchor="middle">Moins de savon actif : une partie précipite.</text>

<rect class="panelOrange" x="270" y="655" width="860" height="62" rx="16"/>
<text class="ink body" x="700" y="695" text-anchor="middle">2 R–COO⁻ Na⁺ + Ca²⁺ → (R–COO)₂Ca ↓ + 2 Na⁺</text>
<rect class="panelBlue" x="330" y="735" width="740" height="54" rx="14"/>
<text class="muted body" x="700" y="770" text-anchor="middle">Tartre = CaCO₃ ; savon calcaire = carboxylate de calcium.</text>

</svg>