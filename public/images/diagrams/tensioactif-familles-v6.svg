<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
<title id="title">Les 4 familles de tensioactifs</title><desc id="desc">Schéma scientifique pédagogique.</desc>
<defs>
<style>
.title{font:700 46px Roboto,Arial,sans-serif;fill:#0b1d3a;letter-spacing:-.8px}
.subtitle{font:400 21px Roboto,Arial,sans-serif;fill:#2f3a49}
.h2{font:700 30px Roboto,Arial,sans-serif;fill:#0b1d3a}
.label{font:600 20px Roboto,Arial,sans-serif;fill:#0b1d3a}
.small{font:400 17px Roboto,Arial,sans-serif;fill:#273449}
.tiny{font:400 14px Roboto,Arial,sans-serif;fill:#4b5563}
.mono{font:500 19px Roboto,Arial,sans-serif;fill:#111827}
.box{fill:#fff;stroke:#d7dce3;stroke-width:2}
.info{fill:#f7fbff;stroke:#1769d1;stroke-width:2}
.warn{fill:#fff9ed;stroke:#d88112;stroke-width:2}
.blue{fill:#1769d1}.orange{fill:#d88112}.green{fill:#237047}.purple{fill:#6a3aa8}.red{fill:#b84b3f}.muted{fill:#667085}
.tail{fill:none;stroke:#111827;stroke-width:4;stroke-linecap:round}
.line{stroke:#d7dce3;stroke-width:2}
</style>
<radialGradient id="headBlue" cx="35%" cy="30%"><stop offset="0" stop-color="#9fd7ff"/><stop offset="1" stop-color="#1769d1"/></radialGradient>
<radialGradient id="headOrange" cx="35%" cy="30%"><stop offset="0" stop-color="#ffe19a"/><stop offset="1" stop-color="#d88112"/></radialGradient>
<marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#111827"/></marker>
<marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#1769d1"/></marker>
<marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#d88112"/></marker>
</defs>
<rect width="100%" height="100%" fill="#fbfaf6"/>
<text x="600.0" y="72" text-anchor="middle" class="title">Les 4 familles de tensioactifs</text>
<text x="600.0" y="112" text-anchor="middle" class="subtitle">La charge ou la neutralité de la tête hydrophile change les propriétés.</text>
<rect x="70" y="190" width="245" height="515" rx="24" fill="#fff" stroke="#1769d1" stroke-width="2"/><text x="192" y="250" text-anchor="middle" class="h2" fill="#1769d1">Anioniques</text><text x="192" y="345" text-anchor="middle" font-size="78" font-weight="600" fill="#1769d1">⊖</text><text x="192" y="440" text-anchor="middle" class="label">Exemples</text><text x="192" y="480" text-anchor="middle" class="small">savon, SLS, SLES</text><line x1="70" y1="530" x2="315" y2="530" class="line"/><text x="192" y="585" text-anchor="middle" class="label">Rôle dominant</text><text x="192" y="630" text-anchor="middle" class="small">détergence / mousse</text><rect x="350" y="190" width="245" height="515" rx="24" fill="#fff" stroke="#d88112" stroke-width="2"/><text x="472" y="250" text-anchor="middle" class="h2" fill="#d88112">Cationiques</text><text x="472" y="345" text-anchor="middle" font-size="78" font-weight="600" fill="#d88112">⊕</text><text x="472" y="440" text-anchor="middle" class="label">Exemples</text><text x="472" y="480" text-anchor="middle" class="small">ammoniums quaternaires</text><line x1="350" y1="530" x2="595" y2="530" class="line"/><text x="472" y="585" text-anchor="middle" class="label">Rôle dominant</text><text x="472" y="630" text-anchor="middle" class="small">conditionnement / fixation</text><rect x="630" y="190" width="245" height="515" rx="24" fill="#fff" stroke="#237047" stroke-width="2"/><text x="752" y="250" text-anchor="middle" class="h2" fill="#237047">Non ioniques</text><text x="752" y="345" text-anchor="middle" font-size="78" font-weight="600" fill="#237047">○</text><text x="752" y="440" text-anchor="middle" class="label">Exemples</text><text x="752" y="480" text-anchor="middle" class="small">APG, polysorbates</text><line x1="630" y1="530" x2="875" y2="530" class="line"/><text x="752" y="585" text-anchor="middle" class="label">Rôle dominant</text><text x="752" y="630" text-anchor="middle" class="small">compatibilité / émulsification</text><rect x="910" y="190" width="245" height="515" rx="24" fill="#fff" stroke="#6a3aa8" stroke-width="2"/><text x="1032" y="250" text-anchor="middle" class="h2" fill="#6a3aa8">Amphotères</text><text x="1032" y="345" text-anchor="middle" font-size="78" font-weight="600" fill="#6a3aa8">⊕⊖</text><text x="1032" y="440" text-anchor="middle" class="label">Exemples</text><text x="1032" y="480" text-anchor="middle" class="small">bétaïnes</text><line x1="910" y1="530" x2="1155" y2="530" class="line"/><text x="1032" y="585" text-anchor="middle" class="label">Rôle dominant</text><text x="1032" y="630" text-anchor="middle" class="small">douceur / formulation</text><rect x="150" y="755" width="900" height="70" rx="18" class="info"/><text x="190" y="800" class="small">Les formules associent souvent plusieurs familles pour combiner efficacité, douceur et stabilité.</text>
</svg>