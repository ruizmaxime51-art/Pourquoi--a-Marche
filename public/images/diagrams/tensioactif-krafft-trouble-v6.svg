<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
<style>
  .bg { fill:#FBFAF7; }
  .panel { fill:#F7F5F0; stroke:#D2C8B8; stroke-width:2; }
  .panelBlue { fill:#F1F6FD; stroke:#2B6CCF; stroke-width:2; }
  .panelOrange { fill:#FCF5E8; stroke:#D98310; stroke-width:2; }
  .panelGreen { fill:#EFF7F1; stroke:#2C7A48; stroke-width:2; }
  .ink { fill:#142544; font-family:Roboto,Arial,sans-serif; }
  .muted { fill:#4B5563; font-family:Roboto,Arial,sans-serif; }
  .small { font-size:22px; }
  .body { font-size:26px; }
  .h1 { font-size:54px; font-weight:800; }
  .h2 { font-size:34px; font-weight:700; }
  .h3 { font-size:30px; font-weight:700; }
  .note { font-size:20px; }
  .caption { font-size:24px; }
  .blue { fill:#2B6CCF; }
  .orange { fill:#D98310; }
  .green { fill:#2C7A48; }
  .darkstroke { stroke:#142544; stroke-width:4; fill:none; stroke-linecap:round; stroke-linejoin:round; }
  .bluestroke { stroke:#2B6CCF; stroke-width:4; fill:none; stroke-linecap:round; stroke-linejoin:round; }
  .orangestroke { stroke:#D98310; stroke-width:4; fill:none; stroke-linecap:round; stroke-linejoin:round; }
  .redstroke { stroke:#D1495B; stroke-width:3.5; fill:none; stroke-linecap:round; stroke-linejoin:round; }
  .dash { stroke-dasharray:9 9; }
</style>
<defs>
  <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
    <path d="M0,0 L12,6 L0,12 z" fill="#142544"/>
  </marker>
  <marker id="blueArrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
    <path d="M0,0 L12,6 L0,12 z" fill="#2B6CCF"/>
  </marker>
  <marker id="orangeArrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
    <path d="M0,0 L12,6 L0,12 z" fill="#D98310"/>
  </marker>
  <marker id="redArrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
    <path d="M0,0 L10,5 L0,10 z" fill="#D1495B"/>
  </marker>
</defs>
<rect class="bg" x="0" y="0" width="1200" height="760" rx="18"/>

<rect class="panel" x="40" y="40" width="1120" height="680" rx="22"/>
<text class="ink h1" x="600" y="110" text-anchor="middle">Point de Krafft et point de trouble</text>
<text class="muted body" x="600" y="155" text-anchor="middle">Deux phénomènes opposés : les ioniques sont limités par le froid, les non ioniques par le chaud.</text>

<rect class="panelBlue" x="95" y="210" width="430" height="360" rx="20"/>
<text class="ink h2 blue" x="310" y="265" text-anchor="middle">Ionique — point de Krafft</text>
<line x1="150" y1="505" x2="150" y2="280" class="bluestroke" marker-end="url(#blueArrow)"/>
<text class="muted small blue" x="124" y="305">chaud</text><text class="muted small blue" x="126" y="505">froid</text>
<line x1="180" y1="390" x2="490" y2="390" class="bluestroke dash"/>
<rect x="250" y="372" width="145" height="36" rx="14" fill="#2B6CCF"/><text x="322" y="397" text-anchor="middle" fill="white" font-family="Roboto,Arial,sans-serif" font-size="20" font-weight="700">Point de Krafft</text>
<text class="ink body blue" x="220" y="345">au-dessus</text>
<text class="muted small" x="220" y="375">solubilité suffisante · micelles possibles</text>
<text class="ink body blue" x="220" y="438">en dessous</text>
<text class="muted small" x="220" y="468">solubilité trop faible · phase solide</text>
