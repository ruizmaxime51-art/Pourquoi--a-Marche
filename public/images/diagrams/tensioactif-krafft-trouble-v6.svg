" stroke="#142544" stroke-width="2.5"/><circle cx="439.6" cy="308.0" r="6" fill="#4A86D9" stroke="#2B6CCF" stroke-width="2"/><path d="M345 500 L380 455 L415 500 L450 455 L485 500 Z" fill="#D5E4F6" stroke="#78AEEA"/>
<rect class="panelOrange" x="675" y="210" width="430" height="360" rx="20"/>
<text class="ink h2 orange" x="890" y="265" text-anchor="middle">Non ionique — point de trouble</text>
<line x1="730" y1="505" x2="730" y2="280" class="orangestroke" marker-end="url(#orangeArrow)"/>
<text class="muted small orange" x="704" y="305">chaud</text><text class="muted small orange" x="706" y="505">froid</text>
<line x1="760" y1="390" x2="1070" y2="390" class="orangestroke dash"/>
<rect x="830" y="372" width="155" height="36" rx="14" fill="#D98310"/><text x="908" y="397" text-anchor="middle" fill="white" font-family="Roboto,Arial,sans-serif" font-size="20" font-weight="700">Point de trouble</text>
<text class="ink body orange" x="780" y="345">au-dessus</text>
<text class="muted small" x="780" y="375">solution trouble · déshydratation</text>
<text class="ink body orange" x="780" y="438">en dessous</text>
<text class="muted small" x="780" y="468">solution limpide et hydratée</text>
