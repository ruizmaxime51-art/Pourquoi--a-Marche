<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
<title id="title">Savon vs syndet</title><desc id="desc">Schéma scientifique pédagogique.</desc>
<defs>
<style>
.title{font:700 46px Roboto,Arial,sans-serif;fill:#0b1d3a;letter-spacing:-.8px}
.subtitle{font:400 21px Roboto,Arial,sans-serif;fill:#2f3a49}
.h2{font:700 30px Roboto,Arial,sans-serif;fill:#0b1d3a}
.label{font:600 20px Roboto,Arial,sans-serif;fill:#0b1d3a}
.small{font:400 17px Roboto,Arial,sans-serif;fill:#273449}
.tiny{font:400 14px Roboto,Arial,sans-serif;fill:#4b5563}
.mono{font:500 19px Roboto,Arial,sans-serif;fill:#111827}
.box{fill:#fff;stroke:#d7dce3;stroke-width:2}
.info{fill:#f7fbff;stroke:#1769d1;stroke-width:2}
.warn{fill:#fff9ed;stroke:#d88112;stroke-width:2}
.blue{fill:#1769d1}.orange{fill:#d88112}.green{fill:#237047}.purple{fill:#6a3aa8}.red{fill:#b84b3f}.muted{fill:#667085}
.tail{fill:none;stroke:#111827;stroke-width:4;stroke-linecap:round}
.line{stroke:#d7dce3;stroke-width:2}
</style>
<radialGradient id="headBlue" cx="35%" cy="30%"><stop offset="0" stop-color="#9fd7ff"/><stop offset="1" stop-color="#1769d1"/></radialGradient>
<radialGradient id="headOrange" cx="35%" cy="30%"><stop offset="0" stop-color="#ffe19a"/><stop offset="1" stop-color="#d88112"/></radialGradient>
<marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#111827"/></marker>
<marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#1769d1"/></marker>
<marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#d88112"/></marker>
</defs>
<rect width="100%" height="100%" fill="#fbfaf6"/>
<text x="600.0" y="72" text-anchor="middle" class="title">Savon vs syndet</text>
<text x="600.0" y="112" text-anchor="middle" class="subtitle">Même principe amphiphile, chimie de tête différente.</text>

<rect x="90" y="210" width="470" height="530" rx="24" fill="#f7fbff" stroke="#1769d1" stroke-width="2"/>
<text x="325" y="275" text-anchor="middle" class="h2 blue">Savon</text>
<circle cx="185" cy="370" r="13.5" fill="url(#headBlue)" stroke="#0b4fa3" stroke-width="1.5"/><path d="M203.0 370 C230.0 353.5 254.0 386.5 281.0 370 S327.5 353.5 353.0 370" class="tail" stroke-width="3.0"/>
<text x="200" y="500" class="mono blue">–COO⁻ Na⁺</text>
<text x="145" y="590" class="small">• issu de la saponification</text><text x="145" y="630" class="small">• pH alcalin</text><text x="145" y="670" class="small">• sensible à l’eau dure</text>
<rect x="640" y="210" width="470" height="530" rx="24" fill="#fff9ed" stroke="#d88112" stroke-width="2"/>
<text x="875" y="275" text-anchor="middle" class="h2 orange">Syndets</text>
<circle cx="710" cy="355" r="9.9" fill="url(#headOrange)" stroke="#0b4fa3" stroke-width="1.1"/><path d="M723.2 355 C743.0 342.9 760.6 367.1 780.4 355 S814.5 342.9 833.2 355" class="tail" stroke-width="2.2"/><text x="850" y="363" class="small">sulfate : –O–SO₃⁻</text><circle cx="710" cy="465" r="9.9" fill="url(#headOrange)" stroke="#0b4fa3" stroke-width="1.1"/><path d="M723.2 465 C743.0 452.9 760.6 477.1 780.4 465 S814.5 452.9 833.2 465" class="tail" stroke-width="2.2"/><text x="850" y="473" class="small">glucoside : –O–sucre</text><circle cx="710" cy="575" r="9.9" fill="url(#headOrange)" stroke="#0b4fa3" stroke-width="1.1"/><path d="M723.2 575 C743.0 562.9 760.6 587.1 780.4 575 S814.5 562.9 833.2 575" class="tail" stroke-width="2.2"/><text x="850" y="583" class="small">bétaïne : –N⁺…COO⁻</text>
<text x="705" y="675" class="small">• pH ajustable • eau dure • propriétés modulables</text>
<rect x="190" y="795" width="820" height="70" rx="18" class="info"/><text x="230" y="838" class="small">Même logique amphiphile, mais pas la même tête hydrophile : les propriétés changent.</text>

</svg>