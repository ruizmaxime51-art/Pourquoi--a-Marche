<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="980" viewBox="0 0 1000 980" role="img" aria-labelledby="title desc">
<title id="title">Mousse et tensioactifs</title><desc id="desc">Coupe d’une lamelle de mousse stabilisée par des tensioactifs.</desc><defs>
<style>
.title{font:700 54px Roboto,Arial,sans-serif;fill:#0b1d3a;letter-spacing:-1px}.subtitle{font:400 23px Roboto,Arial,sans-serif;fill:#2f3a49}.h2{font:700 34px Roboto,Arial,sans-serif;fill:#0b1d3a}.label{font:600 22px Roboto,Arial,sans-serif;fill:#0b1d3a}.small{font:400 19px Roboto,Arial,sans-serif;fill:#26313f}.tiny{font:400 16px Roboto,Arial,sans-serif;fill:#415063}.blue{fill:#1769d1}.orange{fill:#d88112}.green{fill:#237047}.purple{fill:#6a3aa8}.ink{fill:#111827}.muted{fill:#4b5563}.line{stroke:#d7dce3;stroke-width:2}.box{fill:#fff;stroke:#d7dce3;stroke-width:2}.info{fill:#f7fbff;stroke:#1769d1;stroke-width:2}.warn{fill:#fff9ed;stroke:#d88112;stroke-width:2}.water{fill:#dcefff;stroke:#68aee8;stroke-width:2}.oil{fill:#ffe1a3;stroke:#e0a144;stroke-width:2}.surface{fill:#e8e5dd;stroke:#b7b3a8;stroke-width:1}.tail{fill:none;stroke:#111827;stroke-width:4;stroke-linecap:round}.dash{stroke-dasharray:8 8}.mono{font:500 20px Roboto,Arial,sans-serif;fill:#111827}
</style>
<radialGradient id="blueHead" cx="35%" cy="30%"><stop offset="0" stop-color="#9fd7ff"/><stop offset="1" stop-color="#1769d1"/></radialGradient>
<radialGradient id="oilDrop" cx="35%" cy="30%"><stop offset="0" stop-color="#ffe19a"/><stop offset="1" stop-color="#d88112"/></radialGradient>
<marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#1769d1"/></marker>
<marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#d88112"/></marker>
<marker id="arrowDark" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#111827"/></marker>
</defs><rect width="100%" height="100%" fill="#fbfaf6"/>
<text x="150" y="92" class="title">Pourquoi ça mousse ?</text><text x="95" y="145" class="subtitle">La mousse est une dispersion d’air dans un liquide, stabilisée par des tensioactifs.</text>
<text x="120" y="425" class="h2">air</text><text x="810" y="425" class="h2">air</text><rect x="430" y="250" width="140" height="300" rx="18" fill="#dcefff" stroke="#8ec5f5" stroke-width="2"/><circle cx="430" cy="280" r="12" fill="url(#blueHead)" stroke="#0b4fa3"/><path d="M418 280 C370 265 340 295 300 280" class="tail" stroke-width="3"/><circle cx="430" cy="318" r="12" fill="url(#blueHead)" stroke="#0b4fa3"/><path d="M418 318 C370 303 340 333 300 318" class="tail" stroke-width="3"/><circle cx="430" cy="356" r="12" fill="url(#blueHead)" stroke="#0b4fa3"/><path d="M418 356 C370 341 340 371 300 356" class="tail" stroke-width="3"/><circle cx="430" cy="394" r="12" fill="url(#blueHead)" stroke="#0b4fa3"/><path d="M418 394 C370 379 340 409 300 394" class="tail" stroke-width="3"/><circle cx="430" cy="432" r="12" fill="url(#blueHead)" stroke="#0b4fa3"/><path d="M418 432 C370 417 340 447 300 432" class="tail" stroke-width="3"/><circle cx="430" cy="470" r="12" fill="url(#blueHead)" stroke="#0b4fa3"/><path d="M418 470 C370 455 340 485 300 470" class="tail" stroke-width="3"/><circle cx="430" cy="508" r="12" fill="url(#blueHead)" stroke="#0b4fa3"/><path d="M418 508 C370 493 340 523 300 508" class="tail" stroke-width="3"/><circle cx="570" cy="280" r="12" fill="url(#blueHead)" stroke="#0b4fa3"/><path d="M582 280 C630 265 660 295 700 280" class="tail" stroke-width="3"/><circle cx="570" cy="318" r="12" fill="url(#blueHead)" stroke="#0b4fa3"/><path d="M582 318 C630 303 660 333 700 318" class="tail" stroke-width="3"/><circle cx="570" cy="356" r="12" fill="url(#blueHead)" stroke="#0b4fa3"/><path d="M582 356 C630 341 660 371 700 356" class="tail" stroke-width="3"/><circle cx="570" cy="394" r="12" fill="url(#blueHead)" stroke="#0b4fa3"/><path d="M582 394 C630 379 660 409 700 394" class="tail" stroke-width="3"/><circle cx="570" cy="432" r="12" fill="url(#blueHead)" stroke="#0b4fa3"/><path d="M582 432 C630 417 660 447 700 432" class="tail" stroke-width="3"/><circle cx="570" cy="470" r="12" fill="url(#blueHead)" stroke="#0b4fa3"/><path d="M582 470 C630 455 660 485 700 470" class="tail" stroke-width="3"/><circle cx="570" cy="508" r="12" fill="url(#blueHead)" stroke="#0b4fa3"/><path d="M582 508 C630 493 660 523 700 508" class="tail" stroke-width="3"/>
<text x="420" y="215" class="label blue">film d’eau / lamelle</text><line x1="500" y1="225" x2="500" y2="250" stroke="#1769d1" stroke-width="3"/><text x="720" y="295" class="label blue">têtes hydrophiles</text><text x="720" y="325" class="small blue">dans l’eau</text><line x1="705" y1="300" x2="570" y2="315" stroke="#1769d1" stroke-width="3"/><text x="735" y="470" class="label orange">queues hydrophobes</text><text x="735" y="500" class="small orange">vers l’air</text><line x1="720" y1="475" x2="640" y2="435" stroke="#d88112" stroke-width="3"/>
<rect x="80" y="620" width="390" height="150" rx="16" class="info"/><text x="105" y="710" class="label blue">drainage</text><line x1="340" y1="650" x2="340" y2="730" stroke="#1769d1" stroke-width="5" marker-end="url(#arrowBlue)"/><text x="205" y="680" class="small">le liquide s’écoule,</text><text x="205" y="710" class="small">le film s’amincit</text><g transform="translate(145 650) scale(.45)"><circle cx="430" cy="280" r="12" fill="url(#blueHead)" stroke="#0b4fa3"/><path d="M418 280 C370 265 340 295 300 280" class="tail" stroke-width="3"/><circle cx="430" cy="318" r="12" fill="url(#blueHead)" stroke="#0b4fa3"/><path d="M418 318 C370 303 340 333 300 318" class="tail" stroke-width="3"/><circle cx="430" cy="356" r="12" fill="url(#blueHead)" stroke="#0b4fa3"/><path d="M418 356 C370 341 340 371 300 356" class="tail" stroke-width="3"/><circle cx="430" cy="394" r="12" fill="url(#blueHead)" stroke="#0b4fa3"/><path d="M418 394 C370 379 340 409 300 394" class="tail" stroke-width="3"/><circle cx="430" cy="432" r="12" fill="url(#blueHead)" stroke="#0b4fa3"/><path d="M418 432 C370 417 340 447 300 432" class="tail" stroke-width="3"/><circle cx="430" cy="470" r="12" fill="url(#blueHead)" stroke="#0b4fa3"/><path d="M418 470 C370 455 340 485 300 470" class="tail" stroke-width="3"/><circle cx="430" cy="508" r="12" fill="url(#blueHead)" stroke="#0b4fa3"/><path d="M418 508 C370 493 340 523 300 508" class="tail" stroke-width="3"/><circle cx="570" cy="280" r="12" fill="url(#blueHead)" stroke="#0b4fa3"/><path d="M582 280 C630 265 660 295 700 280" class="tail" stroke-width="3"/><circle cx="570" cy="318" r="12" fill="url(#blueHead)" stroke="#0b4fa3"/><path d="M582 318 C630 303 660 333 700 318" class="tail" stroke-width="3"/><circle cx="570" cy="356" r="12" fill="url(#blueHead)" stroke="#0b4fa3"/><path d="M582 356 C630 341 660 371 700 356" class="tail" stroke-width="3"/><circle cx="570" cy="394" r="12" fill="url(#blueHead)" stroke="#0b4fa3"/><path d="M582 394 C630 379 660 409 700 394" class="tail" stroke-width="3"/><circle cx="570" cy="432" r="12" fill="url(#blueHead)" stroke="#0b4fa3"/><path d="M582 432 C630 417 660 447 700 432" class="tail" stroke-width="3"/><circle cx="570" cy="470" r="12" fill="url(#blueHead)" stroke="#0b4fa3"/><path d="M582 470 C630 455 660 485 700 470" class="tail" stroke-width="3"/><circle cx="570" cy="508" r="12" fill="url(#blueHead)" stroke="#0b4fa3"/><path d="M582 508 C630 493 660 523 700 508" class="tail" stroke-width="3"/></g>
<rect x="520" y="620" width="400" height="150" rx="16" class="warn"/><text x="575" y="665" class="h2 orange">Mousse ≠ pouvoir lavant</text><line x1="560" y1="690" x2="880" y2="690" stroke="#d88112"/><text x="560" y="728" class="small">La mousse renseigne surtout sur la stabilité</text><text x="560" y="758" class="small">des bulles, pas sur l’efficacité de nettoyage.</text>
<rect x="80" y="830" width="840" height="80" rx="16" class="info"/><circle cx="120" cy="870" r="24" fill="#eaf1ff" stroke="#1769d1" stroke-width="2"/><text x="112" y="882" font-size="32" font-weight="700" fill="#1769d1">i</text><text x="165" y="862" class="small">Les tensioactifs abaissent la tension superficielle</text><text x="165" y="892" class="small">et aident à stabiliser les films de mousse.</text>
</svg>