 x="994.1" y="415" text-anchor="middle" class="tiny">13</text><line x1="1059.8" y1="350" x2="1059.8" y2="380" stroke="#111827" stroke-width="2"/><text x="1059.8" y="415" text-anchor="middle" class="tiny">14</text>
