" stroke="#142544" stroke-width="2.3"/><circle cx="514.6" cy="330.0" r="6" fill="#4A86D9" stroke="#2B6CCF" stroke-width="2"/>
<text class="ink body blue" x="240" y="470">en dessous</text>
<text class="muted small" x="240" y="495">solubilité trop faible · solide / précipité</text>
<path d="M425 530 L465 485 L505 530 L545 485 L585 530 Z" fill="#D5E4F6" stroke="#78AEEA"/>

<rect class="panelOrange" x="790" y="220" width="500" height="380" rx="24"/>
<text class="ink h2 orange" x="1040" y="270" text-anchor="middle">Non ionique — point de trouble</text>
<line x1="850" y1="530" x2="850" y2="305" class="orangestroke" marker-end="url(#orangeArrow)"/>
<text class="muted small orange" x="825" y="325">chaud</text><text class="muted small orange" x="828" y="530">froid</text>
<line x1="895" y1="410" x2="1245" y2="410" class="orangestroke dash"/>
<rect x="990" y="392" width="170" height="36" rx="14" fill="#D98310"/><text x="1075" y="417" text-anchor="middle" fill="white" font-family="Roboto,Arial,sans-serif" font-size="19" font-weight="700">Point de trouble</text>
<text class="ink body orange" x="920" y="370">au-dessus</text>
<text class="muted small" x="920" y="395">solution trouble · déshydratation</text>
<circle cx="1170" cy="350" r="18" fill="#F2C45B"/>
<circle cx="1206.0" cy="350.0" r="5" fill="#E9AB57" stroke="#D98310" stroke-width="1.5"/><circle cx="1201.2" cy="368.0" r="5" fill="#E9AB57" stroke="#D98310" stroke-width="1.5"/><circle cx="1188.0" cy="381.2" r="5" fill="#E9AB57" stroke="#D98310" stroke-width="1.5"/><circle cx="1170.0" cy="386.0" r="5" fill="#E9AB57" stroke="#D98310" stroke-width="1.5"/><circle cx="1152.0" cy="381.2" r="5" fill="#E9AB57" stroke="#D98310" stroke-width="1.5"/><circle cx="1138.8" cy="368.0" r="5" fill="#E9AB57" stroke="#D98310" stroke-width="1.5"/><circle cx="1134.0" cy="350.0" r="5" fill="#E9AB57" stroke="#D98310" stroke-width="1.5"/><circle cx="1138.8" cy="332.0" r="5" fill="#E9AB57" stroke="#D98310" stroke-width="1.5"/><circle cx="1152.0" cy="318.8" r="5" fill="#E9AB57" stroke="#D98310" stroke-width="1.5"/><circle cx="1170.0" cy="314.0" r="5" fill="#E9AB57" stroke="#D98310" stroke-width="1.5"/><circle cx="1188.0" cy="318.8" r="5" fill="#E9AB57" stroke="#D98310" stroke-width="1.5"/><circle cx="1201.2" cy="332.0" r="5" fill="#E9AB57" stroke="#D98310" stroke-width="1.5"/>
<text class="ink body orange" x="920" y="470">en dessous</text>
<text class="muted small" x="920" y="495">solution limpide et hydratée</text>
<path d="M1030 525 C1060 505, 1090 545, 1120 525 S1180 545, 1210 525" class="darkstroke"/>
<circle cx="1030" cy="525" r="6" fill="#F2C45B" stroke="#D98310" stroke-width="2"/><circle cx="1120" cy="525" r="6" fill="#F2C45B" stroke="#D98310" stroke-width="2"/><circle cx="1210" cy="525" r="6" fill="#F2C45B" stroke="#D98310" stroke-width="2"/>
<rect class="panel" x="280" y="680" width="840" height="70" rx="16"/>
<text class="muted body" x="700" y="723" text-anchor="middle">Krafft = limite basse de micellisation ; trouble = limite haute de stabilité en solution.</text>

</svg>