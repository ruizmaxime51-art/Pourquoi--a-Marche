<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
<style>
  .bg { fill:#FBFAF7; }
  .panel { fill:#F7F5F0; stroke:#D2C8B8; stroke-width:2.2; }
  .panelBlue { fill:#F1F6FD; stroke:#2B6CCF; stroke-width:2.2; }
  .panelOrange { fill:#FCF5E8; stroke:#D98310; stroke-width:2.2; }
  .panelGreen { fill:#EFF7F1; stroke:#2C7A48; stroke-width:2.2; }
  .ink { fill:#142544; font-family:Roboto,Arial,sans-serif; }
  .muted { fill:#4B5563; font-family:Roboto,Arial,sans-serif; }
  .small { font-size:18px; }
  .body { font-size:22px; }
  .h1 { font-size:44px; font-weight:800; }
  .h2 { font-size:28px; font-weight:700; }
  .h3 { font-size:24px; font-weight:700; }
  .blue { fill:#2B6CCF; }
  .orange { fill:#D98310; }
  .green { fill:#2C7A48; }
  .darkstroke { stroke:#142544; stroke-width:4; fill:none; stroke-linecap:round; stroke-linejoin:round; }
  .bluestroke { stroke:#2B6CCF; stroke-width:3.5; fill:none; stroke-linecap:round; stroke-linejoin:round; }
  .orangestroke { stroke:#D98310; stroke-width:3.5; fill:none; stroke-linecap:round; stroke-linejoin:round; }
  .greenstroke { stroke:#2C7A48; stroke-width:3.5; fill:none; stroke-linecap:round; stroke-linejoin:round; }
  .redstroke { stroke:#D1495B; stroke-width:3; fill:none; stroke-linecap:round; stroke-linejoin:round; }
  .dash { stroke-dasharray:8 8; }
</style>
<defs>
  <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
    <path d="M0,0 L12,6 L0,12 z" fill="#142544"/>
  </marker>
  <marker id="blueArrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
    <path d="M0,0 L10,5 L0,10 z" fill="#2B6CCF"/>
  </marker>
  <marker id="orangeArrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
    <path d="M0,0 L10,5 L0,10 z" fill="#D98310"/>
  </marker>
  <marker id="redArrow" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
    <path d="M0,0 L8,4 L0,8 z" fill="#D1495B"/>
  </marker>
</defs>
<rect class="bg" width="1400" height="900" rx="18"/>

<rect class="panel" x="50" y="50" width="1300" height="800" rx="24"/>
<text class="ink h1" x="700" y="110" text-anchor="middle">Point de Krafft et point de trouble</text>
<text class="muted body" x="700" y="150" text-anchor="middle">Les ioniques craignent surtout le froid ; les non ioniques éthoxylés craignent surtout le chaud.</text>

<rect class="panelBlue" x="110" y="220" width="500" height="380" rx="24"/>
<text class="ink h2 blue" x="360" y="270" text-anchor="middle">Ionique — point de Krafft</text>
<line x1="170" y1="530" x2="170" y2="305" class="bluestroke" marker-end="url(#blueArrow)"/>
<text class="muted small blue" x="145" y="325">chaud</text><text class="muted small blue" x="148" y="530">froid</text>
<line x1="215" y1="410" x2="565" y2="410" class="bluestroke dash"/>
<rect x="315" y="392" width="160" height="36" rx="14" fill="#2B6CCF"/><text x="395" y="417" text-anchor="middle" fill="white" font-family="Roboto,Arial,sans-serif" font-size="19" font-weight="700">Point de Krafft</text>
<text class="ink body blue" x="240" y="370">au-dessus</text>
<text class="muted small" x="240" y="395">solubilité suffisante · micelles possibles</text>
