<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
<style>
  .bg { fill:#FBFAF7; }
  .panel { fill:#F7F5F0; stroke:#D2C8B8; stroke-width:2.2; }
  .panelBlue { fill:#F1F6FD; stroke:#2B6CCF; stroke-width:2.2; }
  .panelOrange { fill:#FCF5E8; stroke:#D98310; stroke-width:2.2; }
  .panelGreen { fill:#EFF7F1; stroke:#2C7A48; stroke-width:2.2; }
  .ink { fill:#142544; font-family:Roboto,Arial,sans-serif; }
  .muted { fill:#4B5563; font-family:Roboto,Arial,sans-serif; }
  .small { font-size:18px; }
  .body { font-size:22px; }
  .h1 { font-size:44px; font-weight:800; }
  .h2 { font-size:28px; font-weight:700; }
  .h3 { font-size:24px; font-weight:700; }
  .blue { fill:#2B6CCF; }
  .orange { fill:#D98310; }
  .green { fill:#2C7A48; }
  .darkstroke { stroke:#142544; stroke-width:4; fill:none; stroke-linecap:round; stroke-linejoin:round; }
  .bluestroke { stroke:#2B6CCF; stroke-width:3.5; fill:none; stroke-linecap:round; stroke-linejoin:round; }
  .orangestroke { stroke:#D98310; stroke-width:3.5; fill:none; stroke-linecap:round; stroke-linejoin:round; }
  .greenstroke { stroke:#2C7A48; stroke-width:3.5; fill:none; stroke-linecap:round; stroke-linejoin:round; }
  .redstroke { stroke:#D1495B; stroke-width:3; fill:none; stroke-linecap:round; stroke-linejoin:round; }
  .dash { stroke-dasharray:8 8; }
</style>
<defs>
  <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
    <path d="M0,0 L12,6 L0,12 z" fill="#142544"/>
  </marker>
  <marker id="blueArrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
    <path d="M0,0 L10,5 L0,10 z" fill="#2B6CCF"/>
  </marker>
  <marker id="orangeArrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
    <path d="M0,0 L10,5 L0,10 z" fill="#D98310"/>
  </marker>
  <marker id="redArrow" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
    <path d="M0,0 L8,4 L0,8 z" fill="#D1495B"/>
  </marker>
</defs>
<rect class="bg" width="1400" height="900" rx="18"/>

<rect class="panel" x="50" y="50" width="1300" height="800" rx="24"/>
<text class="ink h1" x="700" y="110" text-anchor="middle">Qu’est-ce qu’un tensioactif ?</text>
<text class="muted body" x="700" y="150" text-anchor="middle">Une molécule amphiphile possède une tête hydrophile et une queue hydrophobe.</text>

<circle cx="390" cy="340" r="52" fill="#2B6CCF" stroke="#1D4EA7" stroke-width="3"/>
<path d="M445 340 C520 285, 600 395, 675 340 S810 390, 900 340" class="darkstroke" stroke-width="8"/>

<text class="ink h2 blue" x="230" y="250">Tête hydrophile</text>
<text class="muted body blue" x="265" y="282">aime l’eau</text>
<line x1="325" y1="295" x2="367" y2="312" class="bluestroke" marker-end="url(#blueArrow)"/>

<text class="ink h2 orange" x="730" y="250">Queue hydrophobe</text>
<text class="muted body orange" x="785" y="282">aime les graisses</text>
<line x1="820" y1="295" x2="860" y2="320" class="orangestroke" marker-end="url(#orangeArrow)"/>

<rect class="panelBlue" x="160" y="560" width="450" height="130" rx="18"/>
<text class="ink body blue" x="195" y="605" font-weight="700">Deux affinités dans une même molécule</text>
<text class="muted body" x="195" y="642">La tête interagit avec l’eau ; la queue</text>
<text class="muted body" x="195" y="670">interagit avec les corps gras.</text>

<rect class="panelOrange" x="760" y="560" width="440" height="130" rx="18"/>
<text class="ink body orange" x="790" y="605" font-weight="700">Exemple : le savon</text>
<text class="ink body" x="790" y="642">R–COO⁻ Na⁺</text>
<text class="muted small" x="790" y="670">R = chaîne hydrophobe ; –COO⁻ = tête hydrophile</text>

</svg>