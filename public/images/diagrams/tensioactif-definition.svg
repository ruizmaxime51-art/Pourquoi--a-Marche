<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
<style>
  .bg { fill:#FBFAF7; }
  .panel { fill:#F7F5F0; stroke:#D2C8B8; stroke-width:2; }
  .panelBlue { fill:#F1F6FD; stroke:#2B6CCF; stroke-width:2; }
  .panelOrange { fill:#FCF5E8; stroke:#D98310; stroke-width:2; }
  .panelGreen { fill:#EFF7F1; stroke:#2C7A48; stroke-width:2; }
  .ink { fill:#142544; font-family:Roboto,Arial,sans-serif; }
  .muted { fill:#4B5563; font-family:Roboto,Arial,sans-serif; }
  .small { font-size:22px; }
  .body { font-size:26px; }
  .h1 { font-size:54px; font-weight:800; }
  .h2 { font-size:34px; font-weight:700; }
  .h3 { font-size:30px; font-weight:700; }
  .note { font-size:20px; }
  .caption { font-size:24px; }
  .blue { fill:#2B6CCF; }
  .orange { fill:#D98310; }
  .green { fill:#2C7A48; }
  .darkstroke { stroke:#142544; stroke-width:4; fill:none; stroke-linecap:round; stroke-linejoin:round; }
  .bluestroke { stroke:#2B6CCF; stroke-width:4; fill:none; stroke-linecap:round; stroke-linejoin:round; }
  .orangestroke { stroke:#D98310; stroke-width:4; fill:none; stroke-linecap:round; stroke-linejoin:round; }
  .redstroke { stroke:#D1495B; stroke-width:3.5; fill:none; stroke-linecap:round; stroke-linejoin:round; }
  .dash { stroke-dasharray:9 9; }
</style>
<defs>
  <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
    <path d="M0,0 L12,6 L0,12 z" fill="#142544"/>
  </marker>
  <marker id="blueArrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
    <path d="M0,0 L12,6 L0,12 z" fill="#2B6CCF"/>
  </marker>
  <marker id="orangeArrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
    <path d="M0,0 L12,6 L0,12 z" fill="#D98310"/>
  </marker>
  <marker id="redArrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
    <path d="M0,0 L10,5 L0,10 z" fill="#D1495B"/>
  </marker>
</defs>
<rect class="bg" x="0" y="0" width="1200" height="760" rx="18"/>

<rect class="panel" x="40" y="40" width="1120" height="680" rx="22"/>
<text class="ink h1" x="600" y="110" text-anchor="middle">Qu’est-ce qu’un tensioactif ?</text>
<text class="muted body" x="600" y="155" text-anchor="middle">Une même molécule possède une tête hydrophile et une queue hydrophobe.</text>

<circle cx="330" cy="330" r="58" fill="#2B6CCF" stroke="#1D4EA7" stroke-width="3"/>
<path d="M388 330 C450 275, 520 390, 585 330 S710 380, 790 330" class="darkstroke" stroke-width="10"/>
<text class="ink h2 blue" x="245" y="255">Tête hydrophile</text>
<text class="muted body blue" x="270" y="290">aime l’eau</text>
<text class="ink h2 orange" x="620" y="255">Queue hydrophobe</text>
<text class="muted body orange" x="665" y="290">aime les graisses</text>
<line x1="280" y1="270" x2="318" y2="314" class="bluestroke" marker-end="url(#blueArrow)"/>
<line x1="700" y1="270" x2="736" y2="312" class="orangestroke" marker-end="url(#orangeArrow)"/>

<rect class="panelBlue" x="110" y="510" width="380" height="130" rx="18"/>
<text class="ink body blue" x="145" y="555" font-weight="700">Deux affinités dans une même molécule</text>
<text class="muted body" x="145" y="595">La tête interagit avec l’eau ; la queue</text>
<text class="muted body" x="145" y="625">interagit avec les corps gras.</text>

<rect class="panelOrange" x="620" y="510" width="420" height="130" rx="18"/>
<text class="ink body orange" x="650" y="555" font-weight="700">Exemple : le savon</text>
<text class="ink body" x="650" y="595">R–COO<tspan dy="-10" font-size="18">−</tspan><tspan dy="10"> Na</tspan><tspan dy="-10" font-size="18">+</tspan></text>
<text class="muted small" x="650" y="625">R = chaîne hydrophobe ; –COO⁻ = tête hydrophile</text>

</svg>