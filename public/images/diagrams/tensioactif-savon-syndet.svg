<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="1030" viewBox="0 0 1000 1030" role="img" aria-labelledby="title desc">
<title id="title">Savon vs syndet</title><desc id="desc">Même queue hydrophobe mais têtes hydrophiles différentes.</desc><defs>
<style>
.title{font:700 54px Roboto,Arial,sans-serif;fill:#0b1d3a;letter-spacing:-1px}.subtitle{font:400 23px Roboto,Arial,sans-serif;fill:#2f3a49}.h2{font:700 34px Roboto,Arial,sans-serif;fill:#0b1d3a}.label{font:600 22px Roboto,Arial,sans-serif;fill:#0b1d3a}.small{font:400 19px Roboto,Arial,sans-serif;fill:#26313f}.tiny{font:400 16px Roboto,Arial,sans-serif;fill:#415063}.blue{fill:#1769d1}.orange{fill:#d88112}.green{fill:#237047}.purple{fill:#6a3aa8}.ink{fill:#111827}.muted{fill:#4b5563}.line{stroke:#d7dce3;stroke-width:2}.box{fill:#fff;stroke:#d7dce3;stroke-width:2}.info{fill:#f7fbff;stroke:#1769d1;stroke-width:2}.warn{fill:#fff9ed;stroke:#d88112;stroke-width:2}.water{fill:#dcefff;stroke:#68aee8;stroke-width:2}.oil{fill:#ffe1a3;stroke:#e0a144;stroke-width:2}.surface{fill:#e8e5dd;stroke:#b7b3a8;stroke-width:1}.tail{fill:none;stroke:#111827;stroke-width:4;stroke-linecap:round}.dash{stroke-dasharray:8 8}.mono{font:500 20px Roboto,Arial,sans-serif;fill:#111827}
</style>
<radialGradient id="blueHead" cx="35%" cy="30%"><stop offset="0" stop-color="#9fd7ff"/><stop offset="1" stop-color="#1769d1"/></radialGradient>
<radialGradient id="oilDrop" cx="35%" cy="30%"><stop offset="0" stop-color="#ffe19a"/><stop offset="1" stop-color="#d88112"/></radialGradient>
<marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#1769d1"/></marker>
<marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#d88112"/></marker>
<marker id="arrowDark" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#111827"/></marker>
</defs><rect width="100%" height="100%" fill="#fbfaf6"/>
<text x="250" y="90" class="title">Savon vs syndet</text><text x="225" y="145" class="subtitle">Même principe amphiphile, chimie de tête différente.</text>
<text x="240" y="215" class="label blue">Tête hydrophile</text><text x="580" y="215" class="label orange">Queue hydrophobe R</text><circle cx="410" cy="265" r="30" fill="url(#blueHead)" stroke="#0b4fa3"/><path d="M440 265 C485 225 530 305 575 265 S665 225 710 265" class="tail" stroke-width="6"/>
<rect x="55" y="330" width="410" height="510" rx="18" fill="#f7fbff" stroke="#1769d1" stroke-width="2"/><text x="205" y="390" class="title blue" font-size="44">Savon</text><circle cx="165" cy="480" r="38" fill="url(#blueHead)" stroke="#0b4fa3"/><path d="M203 480 C245 445 285 515 325 480 S405 445 445 480" class="tail" stroke-width="6"/><text x="160" y="575" class="mono blue">–COO⁻ Na⁺</text><text x="120" y="660" class="small">• issu de la saponification</text><text x="120" y="710" class="small">• pH alcalin</text><text x="120" y="760" class="small">• sensible à l’eau dure</text>
<rect x="535" y="330" width="410" height="510" rx="18" fill="#fffaf1" stroke="#d88112" stroke-width="2"/><text x="665" y="390" class="title orange" font-size="44">Syndets</text><g transform="translate(590 455)"><circle cx="0" cy="0" r="24" fill="url(#oilDrop)"/><path d="M25 0 C70 -35 110 35 155 0" class="tail" stroke-width="5"/><text x="185" y="8" class="small">sulfate</text><text x="0" y="64" class="mono orange">–O–SO₃⁻</text></g><g transform="translate(590 585)"><circle cx="0" cy="0" r="24" fill="url(#oilDrop)"/><path d="M25 0 C70 -35 110 35 155 0" class="tail" stroke-width="5"/><text x="185" y="8" class="small">glucoside</text><text x="0" y="64" class="mono orange">–O–sucre</text></g><g transform="translate(590 715)"><circle cx="0" cy="0" r="24" fill="url(#oilDrop)"/><path d="M25 0 C70 -35 110 35 155 0" class="tail" stroke-width="5"/><text x="185" y="8" class="small">bétaïne</text><text x="0" y="64" class="mono orange">–N⁺…COO⁻</text></g><text x="680" y="790" class="small">pH ajustable • eau dure • propriétés modulables</text>
<rect x="70" y="890" width="860" height="95" rx="18" class="info"/><circle cx="115" cy="937" r="26" fill="#eaf1ff" stroke="#1769d1" stroke-width="2"/><text x="106" y="950" font-size="36" font-weight="700" fill="#1769d1">i</text><text x="165" y="925" class="small">Savon et syndets sont tous deux des tensioactifs :</text><text x="165" y="955" class="small">pas la même tête hydrophile, donc pas les mêmes propriétés.</text>
</svg>