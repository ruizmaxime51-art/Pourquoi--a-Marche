</defs><rect width="100%" height="100%" fill="#fbfaf6"/><text x="70" y="95" class="title">Les 4 familles de tensioactifs</text><text x="90" y="150" class="subtitle">La nature de la tête hydrophile détermine une grande partie des propriétés.</text><rect x="55" y="240" width="205" height="530" rx="18" fill="#fff" stroke="#1769d1" stroke-width="2"/><text x="83" y="300" font-size="31" font-weight="700" fill="#1769d1" font-family="system-ui,sans-serif">Anioniques</text><circle cx="158" cy="395" r="48" fill="none" stroke="#1769d1" stroke-width="6"/><text x="133" y="412" font-size="58" font-weight="700" fill="#1769d1" font-family="system-ui,sans-serif">⊖</text><text x="110" y="505" class="label" fill="#1769d1">Exemples</text><text x="90" y="555" class="small">savon, SLS, SLES</text><line x1="55" y1="600" x2="260" y2="600" class="line"/><text x="93" y="655" class="label" fill="#1769d1">Rôle dominant</text><text x="80" y="705" class="small">détergence / mousse</text><circle cx="85" cy="748" r="5" fill="#1769d1"/><text x="100" y="755" class="tiny">souvent bons moussants</text><rect x="290" y="240" width="205" height="530" rx="18" fill="#fff" stroke="#d88112" stroke-width="2"/><text x="318" y="300" font-size="31" font-weight="700" fill="#d88112" font-family="system-ui,sans-serif">Cationiques</text><circle cx="393" cy="395" r="48" fill="none" stroke="#d88112" stroke-width="6"/><text x="368" y="412" font-size="58" font-weight="700" fill="#d88112" font-family="system-ui,sans-serif">⊕</text><text x="345" y="505" class="label" fill="#d88112">Exemples</text><text x="325" y="555" class="small">ammoniums quaternaires</text><line x1="290" y1="600" x2="495" y2="600" class="line"/><text x="328" y="655" class="label" fill="#d88112">Rôle dominant</text><text x="315" y="705" class="small">conditionnement / fixation</text><circle cx="320" cy="748" r="5" fill="#d88112"/><text x="335" y="755" class="tiny">peu détergents</text><rect x="525" y="240" width="205" height="530" rx="18" fill="#fff" stroke="#237047" stroke-width="2"/><text x="553" y="300" font-size="31" font-weight="700" fill="#237047" font-family="system-ui,sans-serif">Non ioniques</text><circle cx="628" cy="395" r="48" fill="none" stroke="#237047" stroke-width="6"/><text x="603" y="412" font-size="58" font-weight="700" fill="#237047" font-family="system-ui,sans-serif">○</text><text x="580" y="505" class="label" fill="#237047">Exemples</text><text x="560" y="555" class="small">APG, polysorbates</text><line x1="525" y1="600" x2="730" y2="600" class="line"/><text x="563" y="655" class="label" fill="#237047">Rôle dominant</text><text x="550" y="705" class="small">compatibilité / émulsification</text><circle cx="555" cy="748" r="5" fill="#237047"/><text x="570" y="755" class="tiny">peu sensibles à l’eau dure</text><rect x="760" y="240" width="205" height="530" rx="18" fill="#fff" stroke="#6a3aa8" stroke-width="2"/><text x="788" y="300" font-size="31" font-weight="700" fill="#6a3aa8" font-family="system-ui,sans-serif">Amphotères</text><circle cx="863" cy="395" r="48" fill="none" stroke="#6a3aa8" stroke-width="6"/><text x="838" y="412" font-size="58" font-weight="700" fill="#6a3aa8" font-family="system-ui,sans-serif">⊕⊖</text><text x="815" y="505" class="label" fill="#6a3aa8">Exemples</text><text x="795" y="555" class="small">bétaïnes</text><line x1="760" y1="600" x2="965" y2="600" class="line"/><text x="798" y="655" class="label" fill="#6a3aa8">Rôle dominant</text><text x="785" y="705" class="small">douceur / formulation</text><circle cx="790" cy="748" r="5" fill="#6a3aa8"/><text x="805" y="755" class="tiny">souvent avec anioniques</text><rect x="90" y="835" width="820" height="85" rx="18" class="info"/><circle cx="130" cy="877" r="25" fill="#eaf1ff" stroke="#1769d1" stroke-width="2"/><text x="122" y="890" font-size="34" font-weight="700" fill="#1769d1">i</text><text x="180" y="868" class="small">En pratique, les formules associent souvent plusieurs familles</text><text x="180" y="898" class="small">pour combiner efficacité, douceur et stabilité.</text><line x1="90" y1="960" x2="910" y2="960" stroke="#d7dce3"/><text x="110" y="1012" class="tiny">SLS = sodium lauryl sulfate  •  SLES = sodium laureth sulfate  •  APG = alkyl polyglucoside</text></svg>