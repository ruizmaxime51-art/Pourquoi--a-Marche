<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="1120" viewBox="0 0 1000 1120" role="img" aria-labelledby="title desc">
<title id="title">Tensioactifs à l’interface huile/eau</title><desc id="desc">Molécules alignées à l’interface huile/eau, têtes dans l’eau et queues dans l’huile.</desc><defs>
<style>
.title{font:700 54px system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#0b1d3a;letter-spacing:-1px}.subtitle{font:400 23px system-ui,sans-serif;fill:#2f3a49}.h2{font:700 34px system-ui,sans-serif;fill:#0b1d3a}.label{font:600 22px system-ui,sans-serif;fill:#0b1d3a}.small{font:400 19px system-ui,sans-serif;fill:#26313f}.tiny{font:400 16px system-ui,sans-serif;fill:#415063}.blue{fill:#1769d1}.orange{fill:#d88112}.green{fill:#237047}.purple{fill:#6a3aa8}.ink{fill:#111827}.muted{fill:#4b5563}.line{stroke:#d7dce3;stroke-width:2}.box{fill:#fff;stroke:#d7dce3;stroke-width:2}.info{fill:#f7fbff;stroke:#1769d1;stroke-width:2}.warn{fill:#fff9ed;stroke:#d88112;stroke-width:2}.water{fill:#dcefff;stroke:#68aee8;stroke-width:2}.oil{fill:#ffe1a3;stroke:#e0a144;stroke-width:2}.surface{fill:#e8e5dd;stroke:#b7b3a8;stroke-width:1}.tail{fill:none;stroke:#111827;stroke-width:4;stroke-linecap:round}.dash{stroke-dasharray:8 8}.mono{font:500 20px ui-monospace,SFMono-Regular,Menlo,monospace;fill:#111827}
</style>
<radialGradient id="blueHead" cx="35%" cy="30%"><stop offset="0" stop-color="#9fd7ff"/><stop offset="1" stop-color="#1769d1"/></radialGradient>
<radialGradient id="oilDrop" cx="35%" cy="30%"><stop offset="0" stop-color="#ffe19a"/><stop offset="1" stop-color="#d88112"/></radialGradient>
<marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#1769d1"/></marker>
<marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#d88112"/></marker>
<marker id="arrowDark" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#111827"/></marker>
</defs><rect width="100%" height="100%" fill="#fbfaf6"/>
<text x="80" y="88" class="title">Pourquoi les tensioactifs</text><text x="80" y="148" class="title">se placent-ils aux interfaces ?</text>
<text x="100" y="205" class="subtitle">Une partie interagit avec l’eau, l’autre avec l’huile : l’interface devient l’emplacement favorable.</text>
<rect x="115" y="285" width="770" height="380" rx="28" fill="#fefbf2" stroke="#9ca3af" stroke-width="2"/>
<path d="M135 292 H865 V470 Q500 500 135 470 Z" fill="#ffe1a3" opacity=".9"/>
<path d="M135 470 Q500 500 865 470 V645 H135 Z" fill="#dcefff" opacity=".95"/>
<path d="M135 470 Q500 500 865 470" fill="none" stroke="#2685d9" stroke-width="3"/>
<text x="460" y="385" class="h2" fill="#b05d00">huile</text><text x="470" y="590" class="h2" fill="#1769d1">eau</text>
<g transform="translate(170 500) scale(0.95)"><circle cx="0" cy="0" r="12" fill="url(#blueHead)" stroke="#0b4fa3" stroke-width="2"/><path d="M0 -13 C10 -28 -10 -42 0 -57 C10 -72 -10 -86 0 -100" class="tail" stroke-width="3"/></g><g transform="translate(225 500) scale(0.95)"><circle cx="0" cy="0" r="12" fill="url(#blueHead)" stroke="#0b4fa3" stroke-width="2"/><path d="M0 -13 C10 -28 -10 -42 0 -57 C10 -72 -10 -86 0 -100" class="tail" stroke-width="3"/></g><g transform="translate(280 500) scale(0.95)"><circle cx="0" cy="0" r="12" fill="url(#blueHead)" stroke="#0b4fa3" stroke-width="2"/><path d="M0 -13 C10 -28 -10 -42 0 -57 C10 -72 -10 -86 0 -100" class="tail" stroke-width="3"/></g><g transform="translate(335 500) scale(0.95)"><circle cx="0" cy="0" r="12" fill="url(#blueHead)" stroke="#0b4fa3" stroke-width="2"/><path d="M0 -13 C10 -28 -10 -42 0 -57 C10 -72 -10 -86 0 -100" class="tail" stroke-width="3"/></g><g transform="translate(390 500) scale(0.95)"><circle cx="0" cy="0" r="12" fill="url(#blueHead)" stroke="#0b4fa3" stroke-width="2"/><path d="M0 -13 C10 -28 -10 -42 0 -57 C10 -72 -10 -86 0 -100" class="tail" stroke-width="3"/></g><g transform="translate(445 500) scale(0.95)"><circle cx="0" cy="0" r="12" fill="url(#blueHead)" stroke="#0b4fa3" stroke-width="2"/><path d="M0 -13 C10 -28 -10 -42 0 -57 C10 -72 -10 -86 0 -100" class="tail" stroke-width="3"/></g><g transform="translate(500 500) scale(0.95)"><circle cx="0" cy="0" r="12" fill="url(#blueHead)" stroke="#0b4fa3" stroke-width="2"/><path d="M0 -13 C10 -28 -10 -42 0 -57 C10 -72 -10 -86 0 -100" class="tail" stroke-width="3"/></g><g transform="translate(555 500) scale(0.95)"><circle cx="0" cy="0" r="12" fill="url(#blueHead)" stroke="#0b4fa3" stroke-width="2"/><path d="M0 -13 C10 -28 -10 -42 0 -57 C10 -72 -10 -86 0 -100" class="tail" stroke-width="3"/></g><g transform="translate(610 500) scale(0.95)"><circle cx="0" cy="0" r="12" fill="url(#blueHead)" stroke="#0b4fa3" stroke-width="2"/><path d="M0 -13 C10 -28 -10 -42 0 -57 C10 -72 -10 -86 0 -100" class="tail" stroke-width="3"/></g><g transform="translate(665 500) scale(0.95)"><circle cx="0" cy="0" r="12" fill="url(#blueHead)" stroke="#0b4fa3" stroke-width="2"/><path d="M0 -13 C10 -28 -10 -42 0 -57 C10 -72 -10 -86 0 -100" class="tail" stroke-width="3"/></g><g transform="translate(720 500) scale(0.95)"><circle cx="0" cy="0" r="12" fill="url(#blueHead)" stroke="#0b4fa3" stroke-width="2"/><path d="M0 -13 C10 -28 -10 -42 0 -57 C10 -72 -10 -86 0 -100" class="tail" stroke-width="3"/></g><g transform="translate(775 500) scale(0.95)"><circle cx="0" cy="0" r="12" fill="url(#blueHead)" stroke="#0b4fa3" stroke-width="2"/><path d="M0 -13 C10 -28 -10 -42 0 -57 C10 -72 -10 -86 0 -100" class="tail" stroke-width="3"/></g><g transform="translate(830 500) scale(0.95)"><circle cx="0" cy="0" r="12" fill="url(#blueHead)" stroke="#0b4fa3" stroke-width="2"/><path d="M0 -13 C10 -28 -10 -42 0 -57 C10 -72 -10 -86 0 -100" class="tail" stroke-width="3"/></g>
<path d="M895 470 h30 M925 470 v55 M895 525 h30" fill="none" stroke="#0b1d3a" stroke-width="3"/><text x="940" y="500" class="label">interface</text><text x="940" y="529" class="label">huile/eau</text>
<rect x="120" y="710" width="350" height="90" rx="16" class="info"/><text x="195" y="747" class="label blue">Tête hydrophile :</text><text x="195" y="777" class="small">reste dans l’eau</text><line x1="270" y1="710" x2="270" y2="505" stroke="#1769d1" stroke-width="3"/><circle cx="270" cy="505" r="5" fill="#1769d1"/>
<rect x="530" y="710" width="350" height="90" rx="16" class="warn"/><text x="605" y="747" class="label orange">Queue hydrophobe :</text><text x="605" y="777" class="small">se place vers l’huile</text><line x1="705" y1="710" x2="705" y2="395" stroke="#d88112" stroke-width="3"/><circle cx="705" cy="395" r="5" fill="#d88112"/>
<rect x="90" y="850" width="820" height="105" rx="20" class="info"/><circle cx="135" cy="902" r="26" fill="#eaf1ff" stroke="#1769d1" stroke-width="2"/><text x="126" y="915" font-size="36" font-weight="700" fill="#1769d1">i</text><text x="180" y="892" class="small">En s’adsorbant à l’interface, les tensioactifs abaissent la tension interfaciale</text><text x="180" y="922" class="small">et facilitent le contact entre deux phases normalement peu miscibles.</text>
<line x1="90" y1="1010" x2="910" y2="1010" stroke="#d7dce3" stroke-width="2"/><text x="125" y="1062" class="small"><tspan font-weight="700">Même principe à l’interface air/eau :</tspan> les tensioactifs stabilisent aussi les mousses.</text>
</svg>